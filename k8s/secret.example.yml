# Copy to secret.yml, fill in real values, apply once per cluster:
#   kubectl apply -f k8s/secret.yml
# Do not commit secret.yml.
apiVersion: v1
kind: Secret
metadata:
  name: mastermind-sync-api-env
type: Opaque
stringData:
  MASTERMIND_SHOPIFY_DOMAIN: https://your-shop.myshopify.com
  MASTERMIND_CLIENT_ID: your-client-id
  MASTERMIND_CLIENT_SECRET: your-client-secret
  MASTERMIND_REDIRECT_URI: https://your-redirect-uri/oauth/callback
  MASTERMIND_SCOPES: read_product_listings,read_products
  MASTERMIND_GRAPHQL_URL: https://your-shop.myshopify.com/admin/api/2025-04/graphql.json
  PRISMART_PROXY_DOMAIN: https://your-prismart-proxy.example/proxy
  PRISMART_USERNAME: your-username
  PRISMART_PASSWORD: your-password
  CUSTOMER_STORE_CODE: your-customer-store-code
  STORE_CODE: your-store-code
