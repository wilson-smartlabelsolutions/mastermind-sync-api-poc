apiVersion: apps/v1
kind: Deployment
metadata:
  name: mastermind-sync-api
  labels:
    app: mastermind-sync-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mastermind-sync-api
  template:
    metadata:
      labels:
        app: mastermind-sync-api
    spec:
      containers:
        - name: mastermind-sync-api
          image: mastermind-sync-api:UAT202607080832
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "9000"
            - name: LOG_LEVEL
              value: info
          envFrom:
            - secretRef:
                name: mastermind-sync-api-env
